<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>client</title>
  <script>
    (function() {
      try {
        const theme = localStorage.getItem('app-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (theme === 'light') document.documentElement.classList.add('light-theme');
        
        // Pre-calculate hue to prevent flash
        const now = new Date();
        now.setMonth(3);
        const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
        const hue = (20 + dayOfYear) % 360;
        document.documentElement.style.setProperty('--dynamic-accent-hue', hue);
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
