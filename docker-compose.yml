version: '3.8'

services:
  app:
    build: .
    container_name: semantic-search
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - app-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/app.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-70b-versatile}
      - ACTIVE_PROFILE=${ACTIVE_PROFILE:-content}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.65}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-*/30 * * * *}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app-data:
    driver: local
