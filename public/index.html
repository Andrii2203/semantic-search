<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Search Engine — Dashboard</title>
  <meta name="description" content="Semantic Search Engine dashboard for reviewing and approving content">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1a3e;
      --bg-card: #1e1e42;
      --bg-card-hover: #252552;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --accent-soft: #8b83ff;
      --success: #2dd4bf;
      --success-bg: rgba(45, 212, 191, 0.12);
      --warning: #fbbf24;
      --warning-bg: rgba(251, 191, 36, 0.12);
      --danger: #f87171;
      --danger-bg: rgba(248, 113, 113, 0.12);
      --text-primary: #f0f0ff;
      --text-secondary: #9e9ec0;
      --text-muted: #6b6b8d;
      --border: #2a2a50;
      --border-light: #35355a;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ─── Header ──────────────────────────────── */
    .header {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-soft), var(--success));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .header .logo { font-size: 1.5rem; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-badge.online {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(45, 212, 191, 0.2);
    }

    .status-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ─── Stats Bar ───────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      padding: 1.5rem 2rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      text-align: center;
      transition: var(--transition);
    }

    .stat-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
      transform: translateY(-2px);
    }

    .stat-card .value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent-soft);
    }

    .stat-card .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ─── Controls ────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.25rem 2rem;
      flex-wrap: wrap;
    }

    .filter-group { display: flex; gap: 0.5rem; }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .action-btn {
      margin-left: auto;
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .action-btn:hover { background: var(--bg-card-hover); border-color: var(--accent); }

    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .action-btn.primary:hover {
      background: var(--accent-soft);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .action-btn.loading .icon { animation: spin 1s linear infinite; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ─── Items ───────────────────────────────── */
    .items-container { padding: 0 2rem 2rem; }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .item-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .item-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: var(--transition);
    }

    .item-card:hover {
      border-color: var(--border-light);
      background: var(--bg-card-hover);
      box-shadow: var(--shadow);
    }

    .item-card:hover::before { opacity: 1; }

    .item-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 0.5rem;
    }

    .item-title a {
      color: inherit;
      text-decoration: none;
      transition: var(--transition);
    }

    .item-title a:hover { color: var(--accent-soft); }

    .thread-hint {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .item-content {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .item-content.collapsed {
      max-height: 80px;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(180deg, #000 50%, transparent);
      mask-image: linear-gradient(180deg, #000 50%, transparent);
    }
    .read-more-btn {
      background: none !important;
      border: none !important;
      color: var(--accent) !important;
      font-size: 0.8rem;
      padding: 0;
      margin-top: -8px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .read-more-btn:hover {
      text-decoration: underline;
      box-shadow: none !important;
    }

    .item-content.expanded { max-height: none; }

    .item-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tag-source {
      background: rgba(108, 99, 255, 0.15);
      color: var(--accent-soft);
      border: 1px solid rgba(108, 99, 255, 0.2);
    }

    .tag-type {
      background: rgba(251, 191, 36, 0.12);
      color: var(--warning);
      border: 1px solid rgba(251, 191, 36, 0.2);
    }

    .tag-link {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .tag-link a {
      color: var(--accent-soft);
      text-decoration: none;
    }

    .tag-link a:hover { text-decoration: underline; }

    /* ─── AI Response Box ─────────────────────── */
    .ai-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      margin-top: 0.75rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ai-label {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-soft);
      margin-bottom: 0.5rem;
    }

    .ai-text {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }

    .item-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text-secondary);
    }

    .btn:hover { border-color: var(--accent); color: var(--text-primary); }

    .btn-generate {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-generate:hover {
      background: var(--accent-soft);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .btn-generate:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .btn-copy.copied {
      border-color: var(--success);
      color: var(--success);
    }

    /* ─── Source Filters ──────────────────────── */
    .source-filters {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 2rem 0.5rem;
    }

    .source-filters .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .source-check {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: var(--transition);
    }

    .source-check:hover { color: var(--text-primary); }

    .source-check input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border-light);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }

    .source-check input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .source-check input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -1px;
      left: 2px;
      font-size: 11px;
      font-weight: 700;
      color: white;
    }

    /* ─── Toast ───────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); background: linear-gradient(135deg, var(--bg-card), rgba(45, 212, 191, 0.08)); }

    /* ─── Empty State ─────────────────────────── */
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

    .loading-skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius);
      height: 120px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 640px) {
      .header { padding: 1rem; }
      .stats-bar { padding: 1rem; gap: 0.5rem; }
      .controls { padding: 1rem; }
      .items-container { padding: 0 1rem 1rem; }
      .item-card { padding: 1rem; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <span class="logo">🔍</span>
      <h1>Semantic Search</h1>
    </div>
    <span class="status-badge online" id="status-badge">
      <span class="dot"></span>
      Online
    </span>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-card">
      <div class="value" id="stat-total">—</div>
      <div class="label">Total Posts</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-new">—</div>
      <div class="label">New</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-approved">—</div>
      <div class="label">Commented</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-skipped">—</div>
      <div class="label">Skipped</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-pending">—</div>
      <div class="label">Pending</div>
    </div>
  </div>

  <div class="controls">
    <div class="filter-group">
      <button class="filter-btn active" data-status="" id="filter-all">All</button>
      <button class="filter-btn" data-status="new" id="filter-new">New</button>
      <button class="filter-btn" data-status="approved" id="filter-approved">Commented</button>
      <button class="filter-btn" data-status="skipped" id="filter-skipped">Skipped</button>
    </div>
    <button class="action-btn primary" id="btn-sync">🚀 Fetch Posts</button>
    <button class="action-btn" id="btn-refresh"><span class="icon">⟳</span> Refresh</button>
  </div>

  <div class="source-filters" id="source-filters">
    <span class="label">Sources:</span>
    <!-- checkboxes rendered dynamically by app.js -->
  </div>

  <div class="items-container">
    <div class="items-list" id="items-list">
      <div class="loading-skeleton"></div>
      <div class="loading-skeleton"></div>
      <div class="loading-skeleton"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
